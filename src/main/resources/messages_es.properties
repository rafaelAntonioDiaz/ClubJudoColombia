# --- Claves para Ejercicios (CBJ) ---
ejercicio.medicion_antropo.nombre=Masa Corporal y Estatura (CBJ)
ejercicio.medicion_antropo.objetivo=Medir la masa corporal y la estatura de los atletas como base para otras evaluaciones.
ejercicio.medicion_antropo.descripcion=Material: Balanza, Estadiůmetro o cinta fijada. Procedimiento: 1. Antes de iniciar los tests fŪsicos, mensurar la masa corporal y estatura de los atletas.

ejercicio.salto_horizontal.nombre=Salto Horizontal (CBJ)
ejercicio.salto_horizontal.objetivo=Evaluar la potencia muscular de los miembros inferiores, factor determinante en la ejecuciůn de tťcnicas durante el combate de judo.
ejercicio.salto_horizontal.descripcion=Material: Cinta mťtrica, Cinta o esparadrapo. Procedimiento: 1. Fijar una cinta al suelo, perpendicularmente a una lŪnea trazada como punto cero. 2. El atleta debe posicionarse atrŠs del marco cero, con los pies paralelos y ligeramente apartados. 3. El atleta saltarŠ la mayor distancia posible, terminando el salto en pie. 4. La distancia serŠ registrada en centŪmetros, a partir de la lŪnea trazada hasta el talůn mŠs průximo. 5. Se realizarŠn 3-6 intentos con al menos 1 minuto de intervalo, registrando el mejor.

ejercicio.suspension_barra.nombre=Suspensiůn en la Barra con Judogi (Isomťtrica y DinŠmica)
ejercicio.suspension_barra.objetivo=Evaluar la resistencia de fuerza isomťtrica y dinŠmica de los miembros superiores, predominantes en las disputas de agarre en judo.
ejercicio.suspension_barra.descripcion=Material: Cronůmetro, Barras de suspensiůn, 1 judogi por barra. Procedimiento: 1. El atleta ejecutarŠ el agarre en un judogi fijado en una barra. 2. Isomťtrico: El atleta flexionarŠ los brazos y permanecerŠ por el tiempo mŠximo de suspensiůn posible. 3. DinŠmico: Tras un intervalo, el atleta realizarŠ el nķmero mŠximo de movimientos de flexiůn y extensiůn de codos hasta el agotamiento. 4. Se contabilizarŠn repeticiones con extensiůn >90į y flexiůn hasta que el mentůn ultrapase la altura de las manos. 5. Para el cŠlculo del valor relativo, multiplicar el nķmero de repeticiones y tiempo total por el peso corporal.

ejercicio.uchikomi_test.nombre=Hikidashi Uchi-komi Test
ejercicio.uchikomi_test.objetivo=Evaluar la aptitud anaerůbica en situaciůn especŪfica, responsable de acciones de alta intensidad en el combate de judo.
ejercicio.uchikomi_test.descripcion=Material: Cronůmetro. Procedimiento: 1. El ejecutante (tori) se posiciona con pies paralelos y realizando el agarre en un uke de peso y altura similar. 2. Al seŮal, el atleta deberŠ realizar la mayor cantidad de hikidashi uchi-komi durante 40 segundos. 3. Se contabilizarŠn las ejecuciones vŠlidas donde el tori genera el desequilibrio del uke hacia adelante, realiza el giro y contacto del cuadril, y retorna rŠpidamente a la posiciůn inicial. 4. El uke no debe ofrecer resistencia.

ejercicio.sjft.nombre=Special Judo Fitness Test (SJFT)
ejercicio.sjft.objetivo=Medir las aptitudes aerůbica y anaerůbica en situaciůn especŪfica para judo, relevantes para acciones de alta intensidad, trabajo intermitente y recuperaciůn.
ejercicio.sjft.descripcion=Material: Monitores de FC, Cronůmetro, Cintas para marcaciůn. Procedimiento: 1. Dos ukes a 6 metros de distancia; el tori a 3 metros. 2. Tres perŪodos (A=15s; B=30s; C=30s) con 10s de intervalo. 3. En cada perŪodo, proyectar a los ukes con ippon-seoi-nage el mŠximo posible. 4. Inmediatamente despuťs del test y tras 1 minuto de reposo, verificar la FC. 5. Õndice = (FC final + FC despuťs de 1 min) / nķmero total de proyecciones.

# --- Claves para Ejercicios (PROESP-BR) ---
ejercicio.carrera_6min.nombre=Prueba de Carrera/Marcha de 6 minutos
ejercicio.carrera_6min.objetivo=Evaluar la aptitud cardiorrespiratoria.
ejercicio.carrera_6min.descripcion=Material: Superficie plana marcada, Cinta mťtrica, Cronůmetro, Hoja de registro. Procedimiento: 1. Dividir en grupos adecuados. 2. Explicar que deben correr el mayor tiempo posible, evitando badenes. 3. Informar tiempos 2, 4 y 5 min. 4. Al final, detenerse y registrar la distancia recorrida. Nota: Datos en metros sin decimales.

ejercicio.sit_reach.nombre=Prueba de Sentarse y Estirarse
ejercicio.sit_reach.objetivo=Evaluar la flexibilidad.
ejercicio.sit_reach.descripcion=Material: Cinta mťtrica, cinta adhesiva. Procedimiento: 1. Cinta mťtrica en el suelo. 2. Cinta adhesiva de 30cm perpendicular a la marca de 38cm. 3. Alumno descalzo, talones en la marca de 38cm, separados 30cm. 4. Rodillas extendidas, manos superpuestas, inclinarse lentamente lo mŠximo posible. 5. Mantener posiciůn para registrar. 6. Dos intentos, registrar el mejor. Nota: Registrar en cm con un decimal.

ejercicio.abdominales_1min.nombre=Prueba de Abdominales de 1 minuto
ejercicio.abdominales_1min.objetivo=Evaluar la resistencia muscular localizada.
ejercicio.abdominales_1min.descripcion=Material: Alfombrillas, cronůmetro. Procedimiento: 1. Alumno en decķbito supino, rodillas flexionadas a 45ļ, brazos cruzados sobre el pecho. 2. Evaluador sujeta los tobillos. 3. A la seŮal, flexionar el torso hasta que los codos toquen los muslos y volver. 4. MŠximo de repeticiones completas en 1 minuto. Nota: Registrar nķmero de movimientos completos.

ejercicio.lanzamiento_balon.nombre=Prueba de Lanzamiento de Balůn Medicinal (2 kg)
ejercicio.lanzamiento_balon.objetivo=Evaluar la potencia de las extremidades superiores.
ejercicio.lanzamiento_balon.descripcion=Material: Cinta mťtrica, balůn medicinal de 2 kg. Procedimiento: 1. Cinta mťtrica fijada perpendicular a la pared, punto cero junto a la pared. 2. Alumno sentado, rodillas extendidas, espalda pegada a la pared. 3. Sujeta el balůn cerca del pecho. 4. A la seŮal, lanzar el balůn lo mŠs lejos posible, manteniendo la espalda contra la pared. 5. Registrar distancia donde el balůn toců el suelo por primera vez. 6. Dos intentos, registrar el mejor. Nota: Registrar en cm con un decimal.

ejercicio.salto_horizontal_proesp.nombre=Prueba de Salto Horizontal (PROESP)
ejercicio.salto_horizontal_proesp.objetivo=Evaluar la potencia de las extremidades inferiores.
ejercicio.salto_horizontal_proesp.descripcion=Material: Cinta mťtrica. Procedimiento: 1. Cinta mťtrica fijada al suelo, perpendicular a la lŪnea de salida. 2. Alumno detrŠs de la lŪnea, pies paralelos, rodillas semiflexionadas. 3. A la seŮal, saltar la mayor distancia posible, aterrizando con ambos pies. 4. Dos intentos, registrar el mejor. Nota: Registrar en cm con un decimal.

ejercicio.agilidad_4x4.nombre=Prueba de 4x4 metros cuadrados (Agilidad)
ejercicio.agilidad_4x4.objetivo=Evaluar la agilidad.
ejercicio.agilidad_4x4.descripcion=Material: Cronůmetro, cuatro conos. Suelo antideslizante. Procedimiento: 1. Trazar un cuadrado de 4m. Cono en cada Šngulo. 2. Alumno detrŠs de la lŪnea de salida. 3. A la seŮal, correr y tocar el cono diagonal. 4. Correr a tocar el cono a su izquierda (o derecha). 5. Correr a tocar el siguiente cono diagonal. 6. Correr al ķltimo cono (punto de partida). 7. Dos intentos, registrar el mejor tiempo. Nota: Registrar en segundos con dos decimales.

ejercicio.carrera_20m.nombre=Prueba de Carrera de 20 metros (Velocidad)
ejercicio.carrera_20m.objetivo=Evaluar la velocidad.
ejercicio.carrera_20m.descripcion=Material: Cronůmetro, conos. Procedimiento: 1. Pista de 20m marcada con lŪnea de salida, lŪnea de cronometraje (20m) y lŪnea de meta (2m despuťs). 2. Alumno parte de pie detrŠs de la primera lŪnea. 3. A la seŮal, avanzar lo mŠs rŠpido posible hacia la lŪnea de meta. 4. Dos intentos, registrar el mejor tiempo. Nota: Registrar en segundos con dos decimales.
