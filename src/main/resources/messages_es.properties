help.poder_combate.titulo=żQué es el Poder de Combate?
help.poder_combate.contenido=El Poder de Combate es un indicador global (1000-5000) que resume tu rendimiento físico basado en las pruebas evaluadas. Se calcula a partir de las clasificaciones (Excelente, Bueno, etc.) de cada prueba, agrupadas en los 5 bloques de Agudelo. El radar muestra tu nivel actual en cada bloque (de 1 a 5 estrellas). Las líneas de motivador en las gráficas representan el siguiente escalón a alcanzar según normas científicas (PROESP/CBJ) o el récord del dojo.
