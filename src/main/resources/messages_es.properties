help.poder_combate.contenido=El Poder de Combate es un indicador global (1000-5000) que resume tu rendimiento fŪsico basado en las pruebas evaluadas. Se calcula a partir de las clasificaciones (Excelente, Bueno, etc.) de cada prueba, agrupadas en los 5 bloques de Agudelo. El radar muestra tu nivel actual en cada bloque (de 1 a 5 estrellas). Las lŪneas de motivador en las grŠficas representan el siguiente escalůn a alcanzar segķn normas cientŪficas (PROESP/CBJ) o el rťcord del dojo.
