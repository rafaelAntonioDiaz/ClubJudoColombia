# ===================================================
# 1. BASE DE DATOS H2 (ARCHIVO EN DISCO)
# ===================================================
# Ruta absoluta donde se guardará la BD en la VM.
# Asegúrate de que el directorio /var/lib/judo/data exista y tenga permisos de escritura.
spring.datasource.url=jdbc:h2:file:/var/lib/judo/data/judo_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Inicialización: se puede dejar en 'always' si tienes scripts data.sql, o 'never' si usas ddl-auto
spring.sql.init.mode=never

# Consola H2 (opcional, puedes deshabilitarla en producción por seguridad)
spring.h2.console.enabled=false

# ===================================================
# 2. JPA / HIBERNATE
# ===================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.hibernate.ddl-auto=update
# ˇImportante! En producción con H2, 'update' es práctico pero ten cuidado con cambios de esquema.
# Para mayor control, podrías usar Flyway con H2 más adelante.

# Desactivar Flyway explícitamente
spring.flyway.enabled=false

# ===================================================
# 3. ALMACENAMIENTO CLOUDFLARE R2
# ===================================================
cloudflare.r2.bucket-name=judo-cloudflare
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================
# 4. CORREO (PRODUCCIÓN)
# ===================================================
spring.mail.host=${SMTP_HOST}
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================
# 5. OPTIMIZACIÓN VAADIN FRONT-END
# ===================================================
vaadin.productionMode=true