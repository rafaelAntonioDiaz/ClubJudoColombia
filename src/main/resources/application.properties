# ===================================================
# 1. CONFIGURACIËN DE BASE DE DATOS (POSTGRESQL)
# ===================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/judo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driverClassName=org.postgresql.Driver

# Flyway para migraciones de esquema
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================================
# 2. CONFIGURACIËN DE JPA / HIBERNATE
# ===================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Optimizaci¾n del Pool de Conexiones (HikariCP) para alta concurrencia
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=JudoClubHikariPool
# ===================================================
# 3. SERVICIO DE CORREO (MAILTRAP - PRUEBAS)
# ===================================================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=f169ad9121a9f4
spring.mail.password=6482da0d794573
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=false

# ===================================================
# 4. ALMACENAMIENTO EN LA NUBE (AWS S3 - FREE TIER)
# ===================================================

cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:dummy_access_key}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:dummy_secret_key}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://dummy.r2.cloudflarestorage.com}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME:judo-assets}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:https://2ad8ced4c45cd4a7b43139dfe53ba7da.r2.cloudflarestorage.com}

